name: ZEREX CARBON CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  NPM_VERSION: '10'

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Check for secrets
        run: |
          if grep -r -i "api_key\|secret\|password\|token" --include="*.js" --include="*.json" --include="*.env*" . | grep -v node_modules | grep -v ".git"; then
            echo "❌ Secrets detected in code!"
            exit 1
          fi
          echo "✅ No secrets found"
          
      - name: Check file sizes
        run: |
          find . -name "*.js" -size +1M -not -path "./node_modules/*" | while read file; do
            echo "❌ Large file detected: $file"
          done

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Start Vercel dev server
        run: |
          npm install -g vercel
          vercel dev --listen 3000 &
          sleep 30
          
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: npm audit --audit-level=moderate
        
      - name: Check for vulnerabilities in dependencies
        run: |
          npm audit --json > audit-results.json || true
          if [ -f audit-results.json ]; then
            vulnerabilities=$(cat audit-results.json | jq '.metadata.vulnerabilities.total // 0')
            if [ "$vulnerabilities" -gt 0 ]; then
              echo "❌ $vulnerabilities vulnerabilities found"
              cat audit-results.json | jq '.vulnerabilities'
              exit 1
            fi
          fi
          echo "✅ No vulnerabilities found"

  accessibility:
    name: Accessibility Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install axe-cli
        run: npm install -g @axe-core/cli
        
      - name: Run accessibility tests
        run: |
          # Start dev server
          npm run dev &
          sleep 30
          
          # Test main pages
          axe http://localhost:3000 --exit
          axe http://localhost:3000/calculator.html --exit
          axe http://localhost:3000/pricing.html --exit
          axe http://localhost:3000/market.html --exit

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Check build artifacts
        run: |
          if [ ! -f "public/index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          if [ ! -f "public/sw.js" ]; then
            echo "❌ service worker not found"
            exit 1
          fi
          echo "✅ Build artifacts present"
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            public/
            api/
            prisma/
            vercel.json
            package.json

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, lighthouse, accessibility]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --confirm'
          working-directory: ./
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          REDIS_URL: ${{ secrets.REDIS_URL_STAGING }}
          
      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://zerex-carbon-staging.vercel.app/ || exit 1
          curl -f https://zerex-carbon-staging.vercel.app/calculator.html || exit 1
          curl -f https://zerex-carbon-staging.vercel.app/pricing.html || exit 1
          echo "✅ Smoke tests passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, lighthouse, accessibility]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --confirm'
          working-directory: ./
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          
      - name: Run production smoke tests
        run: |
          sleep 30
          curl -f https://zerex-carbon.com/ || exit 1
          curl -f https://zerex-carbon.com/calculator.html || exit 1
          curl -f https://zerex-carbon.com/pricing.html || exit 1
          echo "✅ Production smoke tests passed"
          
      - name: Notify deployment
        run: |
          echo "🚀 ZEREX CARBON deployed to production!"
          echo "URL: https://zerex-carbon.com"
          echo "Commit: ${{ github.sha }}"

  post-deploy:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Run comprehensive tests
        run: |
          # Test critical user journeys
          echo "Testing critical user journeys..."
          
          # Test homepage loads
          curl -f https://zerex-carbon.com/ || exit 1
          
          # Test calculator loads
          curl -f https://zerex-carbon.com/calculator.html || exit 1
          
          # Test pricing loads
          curl -f https://zerex-carbon.com/pricing.html || exit 1
          
          # Test API endpoints
          curl -f https://zerex-carbon.com/api/quota || exit 1
          
          echo "✅ All critical paths working"
          
      - name: Performance check
        run: |
          # Quick performance check
          response_time=$(curl -o /dev/null -s -w '%{time_total}' https://zerex-carbon.com/)
          echo "Homepage response time: ${response_time}s"
          
          if (( $(echo "$response_time > 3.0" | bc -l) )); then
            echo "❌ Response time too slow: ${response_time}s"
            exit 1
          fi
          
          echo "✅ Performance check passed"

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Cleanup old deployments
        run: |
          echo "🧹 Cleaning up old deployments..."
          # Add cleanup logic here if needed
          echo "✅ Cleanup completed"




